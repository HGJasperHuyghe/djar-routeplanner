services:
  - type: web
    name: djar-routeplanner
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: cd backend && npm ci --include=dev && npm run build && cd ../frontend && npm ci --include=dev && npm run build
    startCommand: npm start --prefix backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
